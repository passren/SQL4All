<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${title}</title>
    <link rel="stylesheet" href="${cssPath}" />
  </head>
  <body>
    <div class="page">
      <h2>${heading}</h2>
      <div class="form">
        <div class="field db-type-field">
          <label>Database Type</label>
          <div
            class="db-type-widget"
            id="dbTypeWidget"
            tabindex="0"
            role="combobox"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Database Type"
          >
            <img
              class="db-type-widget-icon"
              id="dbTypeIcon"
              src=""
              alt=""
              aria-hidden="true"
              hidden
            />
            <span class="db-type-widget-label" id="dbTypeLabel"
              >-- Select Database --</span
            >
            <span class="db-type-widget-chevron" aria-hidden="true">
              <svg
                width="10"
                height="6"
                viewBox="0 0 10 6"
                fill="currentColor"
                focusable="false"
              >
                <path d="M0 0l5 6 5-6H0z" />
              </svg>
            </span>
            <ul
              class="db-type-widget-list"
              id="dbTypeList"
              role="listbox"
              aria-label="Database Type"
            ></ul>
          </div>
          <input type="hidden" id="databaseType" />
        </div>
        <div class="field field-empty" aria-hidden="true"></div>
        <div class="field"><label>Name</label><input id="name" maxlength="20" /></div>
        <div class="field"><label>Host</label><input id="host" /></div>
        <div class="field">
          <label>Port</label
          ><input id="port" type="number" min="1" max="65535" />
        </div>
        <div class="field"><label>Database</label><input id="database" /></div>
        <div class="field">
          <label>Username (optional)</label><input id="username" />
        </div>
        <div class="field">
          <label>Password (optional)</label
          ><input id="password" type="password" />
        </div>
        <div class="field field-dialect">
          <label>Dialect</label>
          <select id="dialect">
            <option value="">-- Select Dialect --</option>
          </select>
          <input id="dialectInput" hidden />
        </div>
        <div class="field field-driver">
          <label>Driver <span id="driverStatus" class="driver-status" hidden></span></label>
          <div class="driver-input-wrap">
            <input id="driver" />
            <button
              id="reloadDriver"
              class="icon-btn reload-driver-btn"
              type="button"
              title="Load the latest driver"
              aria-label="Load the latest driver"
              hidden
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" focusable="false">
                <path d="M13.451 5.609l-.579-.939-1.068.812-.076.094c-.335.415-.927 1.146-1.545 1.146-.277 0-.554-.117-.83-.35l-.083-.065-.063-.088c-.377-.53-.513-1.15-.376-1.748.147-.642.567-1.203 1.147-1.534l.083-.047.089-.032 1.3-.453-.684-.879L10.2 2.2c-.239.062-.498.187-.765.37A3.018 3.018 0 007.93 4.675c-.1.67.066 1.367.465 1.96a2.287 2.287 0 01-.145.16l-5.416 5.416a1.617 1.617 0 000 2.283 1.617 1.617 0 002.283 0l5.416-5.416.16-.145c.593.399 1.29.565 1.96.465a3.018 3.018 0 002.105-1.505c.183-.267.308-.526.37-.765l.174-.564zM4.4 13.7a.817.817 0 11-.001-1.634.817.817 0 01.001 1.634z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field field-full">
          <div class="section-header">
            <div class="section-title">Additional Parameters</div>
            <button
              id="addParam"
              class="secondary icon-btn"
              type="button"
              title="Add parameter"
              aria-label="Add parameter"
            >
              +
            </button>
          </div>
          <div class="params-wrap">
            <table>
              <thead>
                <tr>
                  <th>Parameter</th>
                  <th>Value</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="additionalParamsBody"></tbody>
            </table>
          </div>
          <div id="additionalParamsEmpty" class="param-empty">
            No additional parameters.
          </div>
        </div>

        <div class="field field-full">
          <label>Connection String</label>
          <div class="inline-field">
            <textarea id="connectionString" readonly rows="3"></textarea>
            <button
              id="copyConnectionString"
              class="secondary icon-btn"
              type="button"
              title="Copy connection string"
              aria-label="Copy connection string"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 16 16"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  fill="currentColor"
                  d="M5 2h8a1 1 0 0 1 1 1v9h-1V3H5V2zm-2 2h8a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm0 1v9h8V5H3z"
                />
              </svg>
            </button>
          </div>
          <div id="copyStatus" class="copy-status"></div>
        </div>
      </div>

      <div id="error" class="error"></div>
      <div id="setupProgress" class="setup-progress" hidden>
        <div class="setup-progress-bar"><div class="setup-progress-fill"></div></div>
        <span id="setupProgressText" class="setup-progress-text"></span>
      </div>
      <div class="actions">
        <button id="cancel" class="secondary">Cancel</button>
        <button id="save" class="primary">${saveLabel}</button>
      </div>
    </div>

    <script>
      window.__SQL4ALL_CONNECTION_EDITOR__ = ${initialJson};
    </script>
    <script src="${jsPath}"></script>
  </body>
</html>
