<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Database cylinder -->
  <ellipse cx="64" cy="38" rx="30" ry="10" fill="url(#db)" opacity="0.9"/>
  <rect x="34" y="38" width="60" height="36" fill="url(#db)" opacity="0.85"/>
  <ellipse cx="64" cy="74" rx="30" ry="10" fill="url(#db)" opacity="0.85"/>
  <!-- Cylinder top ring -->
  <ellipse cx="64" cy="38" rx="30" ry="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Middle ring -->
  <path d="M34 56 Q34 66 64 66 Q94 66 94 56" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
  <!-- SQL text -->
  <text x="64" y="103" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="1">SQL</text>
  <!-- 4ALL text -->
  <text x="64" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#E0E7FF" letter-spacing="2">4ALL</text>
</svg>
