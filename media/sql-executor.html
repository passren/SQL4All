<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL4ALL Query</title>
    <link rel="stylesheet" href="${cssPath}" />
    <link rel="stylesheet" href="${cmCssPath}" />
  </head>
  <body>
    <div class="container">
      <section class="query-pane">
        <div class="query-toolbar">
          <div class="toolbar-left">
          <div class="section-title">SQL Editor</div>
          <div class="editor-file-actions">
            <button id="openFileBtn" class="btn btn-small btn-icon" title="Open File...">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M1.5 1h4l1.5 2H14a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2.5A1.5 1.5 0 0 1 1.5 1zM2 5v8h12V5H2z" />
                </svg>
              </span>
              <span>Open...</span>
            </button>
            <div class="recent-files-wrap">
              <button id="recentFilesBtn" class="btn-dropdown-arrow" title="Recent Files">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M4 6l4 4 4-4H4z" />
                </svg>
              </button>
              <div id="recentFilesMenu" class="recent-files-menu hidden"></div>
            </div>
            <button id="saveFileBtn" class="btn btn-small btn-icon" title="Save File...">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M13.353 1.146l1.5 1.5A.5.5 0 0 1 15 3v11.5a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-13A.5.5 0 0 1 1.5 1H12a.5.5 0 0 1 .353.146zM2 2v12h12V3.207L12.793 2H11v4H4V2H2zm3 0v3h5V2H5zm1 8h4v4H6v-4z" />
                </svg>
              </span>
              <span>Save...</span>
            </button>
            <button id="saveAsFileBtn" class="btn btn-small btn-icon" title="Save As...">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M13.353 1.146l1.5 1.5A.5.5 0 0 1 15 3v11.5a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-13A.5.5 0 0 1 1.5 1H12a.5.5 0 0 1 .353.146zM2 2v12h12V3.207L12.793 2H11v4H4V2H2zm3 0v3h5V2H5zm1 8h4v4H6v-4z" />
                </svg>
              </span>
              <span>Save As...</span>
            </button>
            <button id="formatBtn" class="btn btn-small btn-icon" title="Format SQL">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M2 3h12v1H2V3zm0 4h8v1H2V7zm0 4h10v1H2v-1z" />
                </svg>
              </span>
              <span>Format</span>
            </button>
          </div>
          </div>
          <div class="query-actions">
            <label class="limit-label" for="limitSelect">Limit</label>
            <select id="limitSelect" class="limit-select" title="Row limit">
              <option value="10" selected>10</option>
              <option value="100">100</option>
              <option value="1000">1000</option>
              <option value="10000">10000</option>
              <option value="">No Limit</option>
            </select>
            <button
              id="runBtn"
              class="btn btn-small btn-icon btn-primary"
              title="Run Query (Ctrl/Cmd+Enter)"
            >
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M3 2.5v11l10-5.5-10-5.5z" />
                </svg>
              </span>
              <span class="btn-label">Run</span>
            </button>
            <button
              id="clearBtn"
              class="btn btn-small btn-icon"
              title="Clear SQL"
            >
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path
                    d="M3.7 3.7a1 1 0 0 1 1.4 0L8 6.6l2.9-2.9a1 1 0 0 1 1.4 1.4L9.4 8l2.9 2.9a1 1 0 0 1-1.4 1.4L8 9.4l-2.9 2.9a1 1 0 1 1-1.4-1.4L6.6 8 3.7 5.1a1 1 0 0 1 0-1.4z"
                  />
                </svg>
              </span>
              <span>Clear</span>
            </button>
          </div>
        </div>
        <div id="queryEditor" class="query-editor-wrap"></div>
      </section>

      <div
        id="paneDivider"
        class="pane-divider"
        role="separator"
        aria-orientation="horizontal"
        aria-label="Resize editor and results panes"
      ></div>

      <section class="results-pane">
        <div class="results-header">
          <div class="section-title">Query Results</div>
          <div class="results-tabs" role="tablist" aria-label="Result views">
            <button
              id="resultsTabTable"
              class="results-tab is-active"
              role="tab"
              aria-selected="true"
              aria-controls="resultsContainer"
              type="button"
            >
              Table
            </button>
            <button
              id="resultsTabJson"
              class="results-tab"
              role="tab"
              aria-selected="false"
              aria-controls="resultsJsonWrap"
              type="button"
            >
              JSON
            </button>
          </div>
          <div class="result-actions">
            <span id="resultCount" class="result-count">Rows: 0</span>
            <span id="columnCount" class="result-count">Columns: 0</span>
            <button id="exportCsvBtn" class="btn btn-small">Export CSV</button>
            <button id="exportJsonBtn" class="btn btn-small">
              Export JSON
            </button>
          </div>
        </div>

        <div class="results-content">
          <div
            id="resultsContainer"
            class="results-table results-panel is-active"
            role="tabpanel"
            aria-labelledby="resultsTabTable"
          >
            <p class="placeholder">Run SQL to view results.</p>
          </div>
          <div
            id="resultsJsonWrap"
            class="results-json-wrap results-panel"
            role="tabpanel"
            aria-labelledby="resultsTabJson"
          >
            <button
              id="copyJsonBtn"
              class="btn btn-small copy-json-btn"
              title="Copy JSON"
              type="button"
            >
              Copy
            </button>
            <pre id="resultsJsonContainer" class="results-json">
{"message": "Run SQL to view results"}</pre
            >
          </div>
        </div>
        <div id="resultsStatus" class="results-status results-status-neutral">
          Ready to query.
        </div>
      </section>
    </div>

    <script src="${cmJsPath}"></script>
    <script src="${cmSqlPath}"></script>
    <script src="${jsPath}"></script>
  </body>
</html>
