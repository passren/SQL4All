<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB PyMongoSQL Query Tool</title>
    <link rel="stylesheet" href="${cssPath}">
</head>
<body>
    <div class="container">
        <h1>MongoDB PyMongoSQL Query Tool</h1>
        
        <div class="main-content">
            <!-- Left Panel: Connections -->
            <div class="left-panel">
                <div class="panel">
                    <h2>Connections</h2>
                    
                    <div class="connection-form">
                        <h3>New Connection</h3>
                        <div class="form-group">
                            <label for="connName">Connection Name:</label>
                            <input type="text" id="connName" placeholder="My MongoDB">
                        </div>
                        <div class="form-group">
                            <label for="connHost">Host:</label>
                            <input type="text" id="connHost" placeholder="localhost" value="localhost">
                        </div>
                        <div class="form-group">
                            <label for="connPort">Port:</label>
                            <input type="number" id="connPort" placeholder="27017" value="27017">
                        </div>
                        <div class="form-group">
                            <label for="connDatabase">Database:</label>
                            <input type="text" id="connDatabase" placeholder="test">
                        </div>
                        <div class="form-group">
                            <label for="connUsername">Username (optional):</label>
                            <input type="text" id="connUsername" placeholder="username">
                        </div>
                        <div class="form-group">
                            <label for="connPassword">Password (optional):</label>
                            <input type="password" id="connPassword" placeholder="password">
                        </div>
                        <button id="saveConnBtn" class="btn btn-primary">Save Connection</button>
                    </div>

                    <div class="connections-list">
                        <h3>Saved Connections</h3>
                        <div id="connectionsList"></div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Query Editor -->
            <div class="right-panel">
                <div class="panel">
                    <div class="query-controls">
                        <select id="connectionSelect">
                            <option value="">Select Connection...</option>
                        </select>
                        <button id="executeBtn" class="btn btn-success">Execute Query</button>
                        <button id="clearBtn" class="btn">Clear</button>
                    </div>

                    <div class="query-section">
                        <h3>SQL Query</h3>
                        <textarea 
                            id="queryEditor" 
                            placeholder="SELECT * FROM collection&#10;&#10;Supports PyMongoSQL syntax"
                            spellcheck="false"
                        ></textarea>
                    </div>

                    <div class="results-section">
                        <div class="results-header">
                            <h3>Results</h3>
                            <div class="result-actions">
                                <button id="exportCsvBtn" class="btn btn-small">Export CSV</button>
                                <button id="exportJsonBtn" class="btn btn-small">Export JSON</button>
                                <span id="resultCount" class="result-count"></span>
                            </div>
                        </div>
                        <div id="resultsContainer" class="results-table">
                            <p class="placeholder">Execute a query to see results...</p>
                        </div>
                    </div>

                    <div class="history-section">
                        <h3>Query History</h3>
                        <div id="historyList" class="history-list">
                            <p class="placeholder">No queries executed yet...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="${jsPath}"></script>
</body>
</html>
