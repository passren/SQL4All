<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL4No Query</title>
    <link rel="stylesheet" href="${cssPath}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1>SQL4No</h1>
                <p class="subtitle">${connectionName} · ${connectionHost}:${connectionPort} / ${databaseName}</p>
            </div>
        </header>

        <section class="query-pane">
            <div class="query-toolbar">
                <div class="section-title">SQL Editor</div>
                <div class="query-actions">
                    <button id="runBtn" class="btn btn-small btn-icon btn-primary" title="Run Query (Ctrl/Cmd+Enter)">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 16 16" focusable="false"><path d="M3 2.5v11l10-5.5-10-5.5z"/></svg>
                        </span>
                        <span>Run</span>
                    </button>
                    <button id="clearBtn" class="btn btn-small btn-icon" title="Clear SQL">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 16 16" focusable="false"><path d="M3.7 3.7a1 1 0 0 1 1.4 0L8 6.6l2.9-2.9a1 1 0 0 1 1.4 1.4L9.4 8l2.9 2.9a1 1 0 0 1-1.4 1.4L8 9.4l-2.9 2.9a1 1 0 1 1-1.4-1.4L6.6 8 3.7 5.1a1 1 0 0 1 0-1.4z"/></svg>
                        </span>
                        <span>Clear</span>
                    </button>
                </div>
            </div>
            <textarea
                id="queryEditor"
                placeholder="SELECT * FROM users LIMIT 20"
                spellcheck="false"
            ></textarea>
        </section>

        <section class="results-pane">
            <div class="results-header">
                <div class="section-title">Query Results</div>
                <div class="result-actions">
                    <span id="resultCount" class="result-count">Rows: 0</span>
                    <span id="columnCount" class="result-count">Columns: 0</span>
                    <button id="exportCsvBtn" class="btn btn-small">Export CSV</button>
                    <button id="exportJsonBtn" class="btn btn-small">Export JSON</button>
                </div>
            </div>
            <div id="resultsStatus" class="results-status results-status-neutral">Ready to query.</div>
            <div id="resultsContainer" class="results-table">
                <p class="placeholder">Run SQL to view results.</p>
            </div>
        </section>
    </div>

    <script src="${jsPath}"></script>
</body>
</html>
